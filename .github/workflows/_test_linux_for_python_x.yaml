name: Test Linux wheel for a given Python version
on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      OPTIONS_NAME:
        required: true
        type: string
      MINIMUM_REQUIREMENTS:
        required: false
        type: string
        default: 0
      OPTIONAL_DEPS:
        required: false
        type: string
        default: 0
      EAGER_IMPORT:
        required: false
        type: string
        default: 0
      WITHOUT_POOCH:
        required: false
        type: string
        default: 0
      PIP_FLAGS:
        required: false
        type: string
        default: ""
      PYTHONOPTIMIZE:
        required: false
        type: string
        default: 0
      INSTALL_FROM_SDIST:
        required: false
        type: string
        default: 0
      test_modified:
        required: false
        type: string
        default: "false"
      base_ref:
        required: false
        type: string
        default: ""

jobs:
  test-linux:
    name: linux-cp${{ inputs.python-version }}-${{ inputs.OPTIONS_NAME }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout scikit-image
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          allow-prereleases: true
          cache: "pip"
          cache-dependency-path: "requirements/*.txt"

      - uses: actions/download-artifact@v4
        id: download
        with:
          name: skimage-linux-${{ inputs.python-version }}
          path: ./dist

      - name: Install wheel
        if: ${{ inputs.INSTALL_FROM_SDIST != 1 }}
        env:
          PIP_FLAGS: ${{ inputs.PIP_FLAGS }}
        run: |
          pip install $PIP_FLAGS dist/*.whl

      - name: Install sdist
        if: ${{ inputs.INSTALL_FROM_SDIST == 1 }}
        env:
          PIP_FLAGS: ${{ inputs.PIP_FLAGS }}
        run: |
          pip install dist/*.tar.gz

      - name: Install spin
        run: pip install spin

      - name: Install test dependencies
        env:
          MINIMUM_REQUIREMENTS: ${{ inputs.MINIMUM_REQUIREMENTS }}
          OPTIONAL_DEPS: ${{ inputs.OPTIONAL_DEPS }}
          WITHOUT_POOCH: ${{ inputs.WITHOUT_POOCH }}
          PIP_FLAGS: ${{ inputs.PIP_FLAGS }}
        run: |
          source .github/scripts/setup-test-env.sh

      - name: Verify non-conflicting dependencies
        if: ${{ inputs.OPTIONAL_DEPS == 1 && inputs.MINIMUM_REQUIREMENTS == 0 }}
        run: |
          # Attempt to resolve all requirements simultaneously
          pip install --dry-run --ignore-installed $(ls requirements/*.txt | sed 's/^/-r /')

      - name: Run tests
        env:
          GITHUB_BASE_REF: ${{ inputs.base_ref }}
          TEST_MODIFIED: ${{ inputs.test_modified }}
          # A lazy loader configuration parameter
          EAGER_IMPORT: ${{ inputs.EAGER_IMPORT }}
          MINIMUM_REQUIREMENTS: ${{ inputs.MINIMUM_REQUIREMENTS }}
          PYTHONOPTIMIZE: ${{ inputs.PYTHONOPTIMIZE }}
        run: |
          if [[ "$TEST_MODIFIED" == "true" ]]; then
            MODIFIED_FLAG="--test-modified"
          else
            MODIFIED_FLAG=""
          fi
          spin test --no-build --doctest $MODIFIED_FLAG

      - name: Check benchmarks
        run: |
          asv check -v -E existing
